databases:
  - name: vendocare-db
    databaseName: vendocare
    user: vendocare_admin
    region: oregon # default or update to your region

services:
  - type: web
    name: vendocare-api
    repo: https://github.com/RitunjKaushik20/VendoCare # Ensure URL is correct
    env: node
    buildCommand: npm install && npm run db:generate
    startCommand: npm run db:deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vendocare-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false # Set this in Render Dashboard to your frontend URL
      - key: ADMIN_EMAIL
        value: "admin@vendocare.com"
      - key: REDIS_URL
        sync: false
